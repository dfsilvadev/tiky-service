sonar.projectKey=dfsilvadev_tiky-service
sonar.organization=dfsilva-dxp
sonar.projectName=tiky-service

sonar.sourceEncoding=UTF-8

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.spec.ts
sonar.exclusions=src/**/*.test.ts,src/**/*.spec.ts,src/generated/**
sonar.coverage.exclusions=src/**/*.test.ts,src/**/*.spec.ts,src/generated/**

# Configurações adicionais para melhorar a detecção de cobertura
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.inclusions=src/**/*.ts