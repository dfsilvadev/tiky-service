name: CI/CD
run-name: ${{ github.actor }} is running CI/CD for tiky-service

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ci:
    name: CI - Lint, Typecheck and Build
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/tiky_service?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type:check

      - name: Build
        run: pnpm build

  test:
    name: CI - Test Suite and Coverage
    runs-on: ubuntu-latest
    needs: [ci]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tiky_service
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tiky_service"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      PORT: 3000
      JWT_SECRET: test-secret-with-at-least-32-characters
      CORS_ORIGINS: http://localhost:3000
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/tiky_service?schema=public
      E2E_DATABASE_URL: postgres://postgres:postgres@localhost:5432/tiky_service?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Run unit tests
        run: pnpm vitest run --project unit --passWithNoTests

      - name: Run e2e tests
        run: pnpm vitest run --project e2e --passWithNoTests

      - name: Generate coverage report
        run: pnpm vitest run --coverage --passWithNoTests

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  sonarcloud:
    name: CI - Sonar Analysis
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Validation and Publish
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tiky_service
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tiky_service"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    permissions:
      contents: read
      packages: write
    env:
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: test-secret-with-at-least-32-characters
      CORS_ORIGINS: https://localhost:3000
      DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/tiky_service?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local Docker image for validation
        run: docker build -t tiky-service:ci .

      - name: Validate Docker container health endpoint
        run: |
          docker run -d --name tiky-ci -p 3000:3000 \
            --add-host=host.docker.internal:host-gateway \
            -e PORT="$PORT" \
            -e NODE_ENV="$NODE_ENV" \
            -e JWT_SECRET="$JWT_SECRET" \
            -e CORS_ORIGINS="$CORS_ORIGINS" \
            -e DATABASE_URL="$DATABASE_URL" \
            tiky-service:ci

          for i in {1..30}; do
            if curl -fsS http://localhost:3000/api/v1/health > /dev/null; then
              echo "Health check passed"
              break
            fi

            if [ "$i" -eq 30 ]; then
              echo "Health check failed after retries. Container logs:"
              docker logs tiky-ci
              exit 1
            fi

            sleep 2
          done

          docker stop tiky-ci
          docker rm tiky-ci

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tiky-service
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
